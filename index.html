<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ИИ-урок — найди свою нишу</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a0533 0%, #2d1060 50%, #1a0533 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }
  .container { width: 100%; max-width: 600px; padding: 20px; }
  .card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 24px;
    padding: 40px 36px;
    backdrop-filter: blur(10px);
  }
  h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; text-align: center; }
  .subtitle { color: rgba(255,255,255,0.6); text-align: center; margin-bottom: 30px; font-size: 15px; }
  label { display: block; font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 6px; margin-top: 18px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, textarea {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 14px 16px;
    color: white;
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
  }
  input:focus, textarea:focus { border-color: rgba(168,85,247,0.8); }
  input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.35); }
  textarea { min-height: 100px; resize: vertical; }
  .btn {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .error { color: #f87171; font-size: 14px; margin-top: 10px; text-align: center; display: none; }
  #loginSection {}
  #chatSection { display: none; }
  .result-box {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(168,85,247,0.4);
    border-radius: 16px;
    padding: 20px;
    margin-top: 20px;
    line-height: 1.7;
    font-size: 15px;
    white-space: pre-wrap;
    display: none;
  }
  .loader { text-align: center; margin-top: 16px; display: none; color: #a855f7; font-size: 15px; }
  .greeting { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="container">

  <!-- ЭКРАН ВХОДА -->
  <div class="card" id="loginSection">
    <h1>🤖 ИИ-урок</h1>
    <p class="subtitle">Найди свою нишу с помощью искусственного интеллекта</p>

    <label>Как тебя зовут?</label>
    <input type="text" id="nameInput" placeholder="Твоё имя" />

    <label>Код доступа</label>
    <input type="password" id="passwordInput" placeholder="Введи код из письма" />

    <p class="error" id="loginError">❌ Неверный код доступа</p>

    <button class="btn" onclick="login()">🚀 Начать работу с ИИ</button>
  </div>

  <!-- ЭКРАН ЧАТА -->
  <div class="card" id="chatSection">
    <p class="greeting" id="greetingText">Привет! 👋</p>
    <p class="subtitle">Расскажи немного о себе — ИИ подберёт твои лучшие ниши</p>

    <label>Твой опыт, навыки, интересы</label>
    <textarea id="userText" placeholder="Например: работала бухгалтером 10 лет, люблю готовить, есть дети, хочу работать онлайн..."></textarea>

    <button class="btn" id="sendBtn" onclick="sendToAI()">🔍 Найти мои ниши с ИИ</button>

    <div class="loader" id="loader">⏳ ИИ думает... подожди 10–20 секунд</div>
    <div class="result-box" id="resultBox"></div>
  </div>

</div>

<script>
const CORRECT_PASSWORD = "kira2026";
let userName = "";

function login() {
  const name = document.getElementById("nameInput").value.trim();
  const pass = document.getElementById("passwordInput").value.trim();
  const err  = document.getElementById("loginError");

  if (!name) { err.style.display = "block"; err.textContent = "❌ Введи своё имя"; return; }
  if (pass !== CORRECT_PASSWORD) { err.style.display = "block"; err.textContent = "❌ Неверный код доступа"; return; }

  userName = name;
  err.style.display = "none";
  document.getElementById("loginSection").style.display = "none";
  document.getElementById("chatSection").style.display = "block";
  document.getElementById("greetingText").textContent = "Привет, " + name + "! 👋";
}

async function sendToAI() {
  const text = document.getElementById("userText").value.trim();
  if (!text) { alert("Расскажи что-нибудь о себе!"); return; }

  const btn    = document.getElementById("sendBtn");
  const loader = document.getElementById("loader");
  const result = document.getElementById("resultBox");

  btn.disabled = true;
  loader.style.display = "block";
  result.style.display = "none";
  result.textContent = "";

  try {
    const resp = await fetch("/.netlify/functions/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: userName, message: text })
    });

    const data = await resp.json();

    if (data.reply) {
      result.textContent = data.reply;
      result.style.display = "block";
    } else if (data.error) {
      result.textContent = "❌ Ошибка: " + data.error;
      result.style.display = "block";
    }
  } catch(e) {
    result.textContent = "❌ Не удалось подключиться к ИИ. Попробуй ещё раз.";
    result.style.display = "block";
  }

  btn.disabled = false;
  loader.style.display = "none";
}

// Вход по Enter
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && document.getElementById("loginSection").style.display !== "none") {
    login();
  }
});
</script>
</body>
</html>

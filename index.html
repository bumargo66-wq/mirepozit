<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ИИ-Урок</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a0533; color: white; font-family: Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { max-width: 600px; width: 90%; }
h1 { text-align: center; font-size: 2em; margin-bottom: 10px; color: #e040fb; }
p { text-align: center; margin-bottom: 30px; color: #ccc; }
input, textarea { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 2px solid #7b2ff7; background: #2a0a4a; color: white; font-size: 16px; }
textarea { height: 120px; resize: none; }
button { width: 100%; padding: 16px; background: linear-gradient(135deg, #7b2ff7, #e040fb); color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
button:hover { opacity: 0.9; }
#login-section, #main-section { display: block; }
#main-section { display: none; }
#result { margin-top: 20px; background: #2a0a4a; border-radius: 10px; padding: 20px; white-space: pre-wrap; line-height: 1.6; min-height: 60px; }
.error { color: #ff5252; }
.loading { color: #e040fb; }
</style>
</head>
<body>
<div class="container">

  <!-- Блок входа -->
  <div id="login-section">
    <h1>🤖 ИИ-Урок</h1>
    <p>Введи своё имя и код доступа</p>
    <input type="text" id="name" placeholder="Как тебя зовут?" />
    <input type="password" id="password" placeholder="Код доступа" />
    <button onclick="login()">🚀 Начать работу с ИИ</button>
    <p id="login-error" class="error" style="margin-top:10px;"></p>
  </div>

  <!-- Основной блок -->
  <div id="main-section">
    <h1>🤖 Привет, <span id="username"></span>!</h1>
    <p>Расскажи о себе — найдём твои ниши</p>
    <textarea id="usertext" placeholder="Напиши о своих навыках, опыте, интересах..."></textarea>
    <button onclick="sendToAI()">🔍 Найти мои ниши с ИИ</button>
    <div id="result"></div>
  </div>

</div>

<script>
const PASS = "kira2026";

function login() {
  const name = document.getElementById("name").value.trim();
  const pass = document.getElementById("password").value.trim();
  if (!name) { document.getElementById("login-error").textContent = "Введи своё имя!"; return; }
  if (pass !== PASS) { document.getElementById("login-error").textContent = "Неверный код доступа!"; return; }
  document.getElementById("username").textContent = name;
  document.getElementById("login-section").style.display = "none";
  document.getElementById("main-section").style.display = "block";
}

async function sendToAI() {
  const text = document.getElementById("usertext").value.trim();
  const result = document.getElementById("result");
  if (!text) { result.innerHTML = '<span class="error">Сначала напиши о себе!</span>'; return; }
  result.innerHTML = '<span class="loading">⏳ ИИ думает... подожди 10-15 секунд...</span>';
  try {
    const response = await fetch("/.netlify/functions/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });
    const data = await response.json();
    if (data.error) { result.innerHTML = '<span class="error">Ошибка: ' + data.error + '</span>'; return; }
    result.textContent = data.reply;
  } catch(e) {
    result.innerHTML = '<span class="error">Ошибка соединения: ' + e.message + '</span>';
  }
}
</script>
</body>
</html>
